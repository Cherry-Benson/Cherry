<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>部門公告 - 僅供內部使用</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      color: #333;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 { color: #0056b3; margin-bottom: 30px; }
    h2 {
      color: #0056b3;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
      margin-top: 25px;
      text-align: left;
    }
    h3 { color: #333; margin-top: 15px; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 10px; }
    a { color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    input[type="password"] { padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin-left: 10px; cursor: pointer; }
    #countdown { color: red; font-weight: bold; margin-top: 20px; }

    .month-section {
      display: flex;
      justify-content: space-between;
      margin-top: 20px;
      text-align: left;
    }
    .category {
      width: 48%;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>部門公告 - 僅供內部使用</h1>

    <!-- 登入區塊 -->
    <div id="loginSection">
      <h2>請輸入密碼</h2>
      <input type="password" id="passwordInput" placeholder="密碼" aria-label="Password Input"/>
      <button id="submitBtn">提交</button>
      <p id="errorMsg" style="color:red;"></p>
    </div>

    <!-- 年份選擇器 -->
    <div id="yearSelector" style="display:none;">
      <label for="yearSelect"><strong>選擇年份：</strong></label>
      <select id="yearSelect"></select>
    </div>

    <div id="fileSection"></div>
    <p id="countdown"></p>
  </div>

  <script>
    const months = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
    
    const formCategories = {
      "人事與行政": [
        { name: "門市文具訂購申請表格", file: "門市文具訂購申請表格.pdf", icon: "👤" },
        { name: "請假申請表", file: "leave_application.pdf", icon: "📅" },
        { name: "差旅申請表", file: "travel_request.pdf", icon: "✈️" },
        { name: "費用報銷表", file: "expense_reimbursement.pdf", icon: "💰" }
      ],
      "行銷部": [
        { name: "活動簡報表單", file: "campaign_brief.pdf", icon: "📢" },
        { name: "專案啟動檢核表", file: "project_kickoff_checklist.pdf", icon: "🚀" },
        { name: "活動報名表", file: "event_registration.pdf", icon: "📝" },
        { name: "創意審核表", file: "creative_approval.pdf", icon: "✔️" }
      ]
    };

    document.getElementById("submitBtn").addEventListener("click", checkPassword);

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const correctPassword = "23306811"; // 修改此密碼字串
      if (input === correctPassword) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("yearSelector").style.display = "block";
        populateYears();
        renderFiles();
        startLogoutTimer();
      } else {
        document.getElementById("errorMsg").textContent = "密碼錯誤，請再試一次。";
      }
    }

    function populateYears() {
      const yearSelect = document.getElementById("yearSelect");
      yearSelect.innerHTML = "";

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y <= currentYear + 2; y++) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y;
        yearSelect.appendChild(option);
      }

      yearSelect.value = currentYear;
      yearSelect.addEventListener("change", renderFiles);
    }

    function renderFiles() {
      const year = document.getElementById("yearSelect").value;
      const section = document.getElementById("fileSection");
      section.innerHTML = "";

      const now = new Date();
      const currentMonthIndex = now.getMonth();

      const h2 = document.createElement("h2");
      h2.textContent = `${months[currentMonthIndex]} ${year}`;
      section.appendChild(h2);

      const monthDiv = document.createElement("div");
      monthDiv.className = "month-section";

      // 人事與行政
      const hrDiv = document.createElement("div");
      hrDiv.className = "category";
      const hrTitle = document.createElement("h3");
      hrTitle.textContent = "人事與行政";
      hrDiv.appendChild(hrTitle);
      const hrUl = document.createElement("ul");
      formCategories["人事與行政"].forEach(form => {
        const li = document.createElement("li");
        li.innerHTML = `${form.icon} <a href="${form.file}" download>${form.name}</a>`;
        hrUl.appendChild(li);
      });
      hrDiv.appendChild(hrUl);

      // 行銷部
      const marketingDiv = document.createElement("div");
      marketingDiv.className = "category";
      const marketingTitle = document.createElement("h3");
      marketingTitle.textContent = "行銷部";
      marketingDiv.appendChild(marketingTitle);
      const marketingUl = document.createElement("ul");
      formCategories["行銷部"].forEach(form => {
        const li = document.createElement("li");
        li.innerHTML = `${form.icon} <a href="${form.file}" download>${form.name}</a>`;
        marketingUl.appendChild(li);
      });
      marketingDiv.appendChild(marketingUl);

      monthDiv.appendChild(hrDiv);
      monthDiv.appendChild(marketingDiv);
      section.appendChild(monthDiv);
    }

    function startLogoutTimer() {
      let remaining = 1800;
      updateCountdown(remaining);

      const countdownInterval = setInterval(() => {
        remaining -= 1;
        if (remaining > 0) {
          updateCountdown(remaining);
        } else {
          clearInterval(countdownInterval);
          logout();
        }
      }, 1000);

      setTimeout(logout, 1800 * 1000);
    }

    function updateCountdown(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      document.getElementById("countdown").textContent =
        `工作階段將於 ${minutes}分 ${secs}秒 後到期。`;
    }

    function logout() {
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("yearSelector").style.display = "none";
      document.getElementById("fileSection").innerHTML = "";
      document.getElementById("passwordInput").value = "";
      document.getElementById("errorMsg").textContent = "工作階段已到期，請重新登入。";
      document.getElementById("countdown").textContent = "工作階段已到期。";
    }
  </script>
</body>
</html>
