<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>部門公告 - 僅供內部使用</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      background-color: #f4f4f4;
      color: #333;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      max-width: 1000px;
      width: 100%;
      background: #fff;
      padding: 30px;
      border-radius: 8px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
      text-align: center;
      opacity: 0;
      animation: fadeIn 1.5s ease forwards;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    h1 { color: #0056b3; margin-bottom: 30px; }
    h2 {
      color: #0056b3;
      border-bottom: 2px solid #eee;
      padding-bottom: 10px;
      margin-top: 25px;
      text-align: left;
    }
    h3 { color: #333; margin-top: 15px; }
    ul { list-style: none; padding: 0; }
    li { margin-bottom: 10px; }
    a { color: #007bff; text-decoration: none; }
    a:hover { text-decoration: underline; }
    input[type="password"] { padding: 10px; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; margin-left: 10px; cursor: pointer; }
    #sessionMsg { color: red; font-weight: bold; margin-top: 20px; }

    .month-section {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      margin-top: 20px;
      text-align: left;
    }
    .category {
      width: 32%;   /* three per row */
      margin-bottom: 20px;
    }
    #logoutBtn {
      position: fixed;   /* 固定在畫面 */
      top: 15px;
      right: 15px;
      background-color: #d9534f;
      color: #fff;
      border: none;
      border-radius: 5px;
      padding: 8px 16px;
      cursor: pointer;
      display: none;
      z-index: 9999; /* 確保在最上層 */
    }
    #logoutBtn:hover {
      background-color: #c9302c;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>部門公告 - 僅供內部使用</h1>

    <!-- 登入區塊 -->
    <div id="loginSection">
      <h2 style="text-align:center;">請輸入密碼</h2>
      <input type="password" id="passwordInput" placeholder="密碼" aria-label="Password Input"/>
      <button id="submitBtn">提交</button>
      <p id="errorMsg" style="color:red;"></p>
    </div>

    <!-- 年份選擇器 -->
    <div id="yearSelector" style="display:none;">
      <label for="yearSelect"><strong>選擇年份：</strong></label>
      <select id="yearSelect"></select>
    </div>

    <div id="fileSection"></div>
    <p id="sessionMsg"></p>
  </div>

  <!-- 固定在右上角的登出按鈕 -->
  <button id="logoutBtn">手動登出</button>

  <script>
    const months = ["一月","二月","三月","四月","五月","六月","七月","八月","九月","十月","十一月","十二月"];
    
    const formCategories = {
      "人事與行政": [
        { name: "門市文具訂購申請表格", file: "門市文具訂購申請表格.pdf", icon: "👤" },
      ],
      "市場部": [
        { name: "video", file: "Video.zip", icon: "✔️" }
      ],
      "銷售與營運部": [
      ]
    };

    document.getElementById("submitBtn").addEventListener("click", checkPassword);
    document.getElementById("logoutBtn").addEventListener("click", confirmLogout);

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const correctPassword = "23306811"; // 修改此密碼字串
      if (input === correctPassword) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("yearSelector").style.display = "block";
        document.getElementById("logoutBtn").style.display = "inline-block";
        populateYears();
        renderFiles();
        startLogoutTimer();
      } else {
        document.getElementById("errorMsg").textContent = "密碼錯誤，請再試一次。";
      }
    }

    function populateYears() {
      const yearSelect = document.getElementById("yearSelect");
      yearSelect.innerHTML = "";

      const currentYear = new Date().getFullYear();
      for (let y = currentYear; y <= currentYear + 3; y++) {
        const option = document.createElement("option");
        option.value = y;
        option.textContent = y;
        yearSelect.appendChild(option);
      }

      yearSelect.value = currentYear;
      yearSelect.addEventListener("change", renderFiles);
    }

    function renderFiles() {
      const year = document.getElementById("yearSelect").value;
      const section = document.getElementById("fileSection");
      section.innerHTML = "";

      const now = new Date();
      const currentMonthIndex = now.getMonth();

      const h2 = document.createElement("h2");
      h2.textContent = `${months[currentMonthIndex]} ${year}`;
      section.appendChild(h2);

      const monthDiv = document.createElement("div");
      monthDiv.className = "month-section";

      Object.keys(formCategories).forEach(dept => {
        const deptDiv = document.createElement("div");
        deptDiv.className = "category";
        const deptTitle = document.createElement("h3");
        deptTitle.textContent = dept;
        deptDiv.appendChild(deptTitle);
        const deptUl = document.createElement("ul");
        formCategories[dept].forEach(form => {
          const li = document.createElement("li");
          li.innerHTML = `${form.icon} <a href="${form.file}" download>${form.name}</a>`;
          deptUl.appendChild(li);
        });
        deptDiv.appendChild(deptUl);
        monthDiv.appendChild(deptDiv);
      });

      section.appendChild(monthDiv);
    }

    function startLogoutTimer() {
      document.getElementById("sessionMsg").textContent =
        "工作階段將於 10 分鐘後自動登出。";
      setTimeout(() => logout(true), 600 * 1000);
    }

    function confirmLogout() {
      const confirmAction = confirm("確定要登出嗎？");
      if (confirmAction) {
        logout(false); // 手動登出，不顯示訊息
      }
    }

    function logout(auto = true) {
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("yearSelector").style.display = "none";
      document.getElementById("fileSection").innerHTML = "";
      document.getElementById("passwordInput").value = "";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("sessionMsg").textContent = "";
      if (auto) {
        document.getElementById("errorMsg").textContent = "工作階段已到期，請重新登入。";
      } else {
        document.getElementById("errorMsg").textContent = ""; // 手動登出不顯示訊息
      }
    }
  </script>
</body>
</html>
