<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>部門公告 - 僅供內部使用</title>
  <style>
    body { 
      margin: 0; 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      font-family: Arial, sans-serif; 
      padding: 20px 0;
      box-sizing: border-box;
    }
    .container { text-align: center; width: 95%; max-width: 1100px; }
    h1 { font-size: 28px; margin-bottom: 8px; }
    #loginSection { font-size: 20px; }
    input[type="password"] { font-size: 18px; padding: 6px 8px; width: 220px; }
    button { font-size: 18px; padding: 6px 10px; cursor: pointer; }
    
    /* Table & Responsive Styles */
    .table-responsive {
      width: 100%;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      margin: auto;
    }
    table { border-collapse: collapse; width: 100%; max-width: 1080px; margin: auto; }
    th, td { border: 1px solid #ccc; padding: 8px; vertical-align: top; min-width: 160px; }
    th { color: white; padding: 10px; }
    a { color: #0645AD; text-decoration: none; }
    a:hover { text-decoration: underline; }
    
    #sessionMsg { font-size: 18px; margin-top: 12px; }
    #errorMsg { color: red; margin-top: 8px; }
    em.no-ann { color: #666; font-style: normal; }
    
    /* Video Modal Overlay Styles */
    .video-overlay {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.95);
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 9999;
    }
    .video-overlay video {
      width: 90%;
      max-width: 960px;
      max-height: 70vh;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
      background-color: #000;
    }
    .video-close-btn {
      margin-top: 20px;
      font-size: 18px;
      padding: 10px 24px;
      background-color: #fff;
      color: #333;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .video-close-btn:hover {
      background-color: #ddd;
    }
    
    @media (max-width:900px) {
      table { font-size: 14px; }
      input[type="password"] { width: 160px; }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>部門公告 - 僅供內部使用</h1>

    <div id="loginSection">
      <h2>請輸入密碼</h2>
      <input type="password" id="passwordInput" placeholder="密碼" aria-label="Password Input" />
      <button id="submitBtn">提交</button>
      <p id="errorMsg"></p>
    </div>

    <div id="fileSection" style="margin-top:20px; display:none;"></div>

    <button id="logoutBtn" style="display:none; margin-top:20px;">手動登出</button>
    <p id="sessionMsg"></p>
  </div>

  <div id="videoModal" class="video-overlay" style="display: none;">
    <video id="modalVideo" controls></video>
    <button id="closeVideoBtn" class="video-close-btn">返回主畫面</button>
  </div>

  <script>
    const formCategories = {
      "市場部":[
        { name: "20260601_香港仔夏季推廣活動_Memo", file: "20260601_香港仔夏季推廣活動_Memo.pdf", icon: "📄", expiry: "2026-09-01" },
        { name: "20260424_Memo_$50 Coupon(專門店版本)", file: "20260424_Memo_$50coupon(專門店版本).pdf", icon: "📄", expiry: "2026-12-31"},
        { name: "20260618_Memo_Cherry x 中原電器", file: "20260618_Memo_Cherry x 中原電器.pdf", icon: "📄", expiry: "2026-08-31" },
        { name: "20240903_Memo_使用優惠券指引", file: "20240903_Memo_使用優惠券指引.pdf", icon: "📄"},
        { name: "20260402_Memo_HKTB_YRO26-27", file: "20260402_Memo_HKTB_YRO26-27.pdf", icon: "📄", expiry: "2027-04-01" },
        { name: "20241208_Memo_長者卡樂悠卡", file: "20241208_Memo_長者卡樂悠卡.pdf", icon: "📄"},
        { name: "20260615_Memo_Olympian City S+ REWARDS_S Dollar", file: "20260615_Memo_Olympian City S+ REWARDS_S Dollar.pdf", icon: "📄"},
        { name: "20250616_Memo_$50 Coupon(新加印版本)", file: "20250616_Memo_$50coupon(新加印版本).pdf", icon: "📄"},
        { name: "20250922_Memo_The Point「會員全年尊尚禮遇」", file: "20250922_Memo_The Point「會員全年尊尚禮遇」.pdf", icon: "📄", expiry: "2026-12-31" },
        { name: "20251209_Memo_將中_健康生活賞", file: "20251209_Memo_將中_健康生活賞.pdf", icon: "📄", expiry: "2026-07-01" },
        { name: "20251216_Memo_Olympian City S+ REWARDS_S Coupon", file: "20251216_Memo_Olympian City S+ REWARDS_S Coupon.pdf", icon: "📄"},
        { name: "20251230_Memo_Olympian City_YRO2026", file: "20251230_Memo_Olympian City_YRO2026.pdf", icon: "📄", expiry: "2026-12-31" },
        { name: "20260119_Memo_Olympian City_全年印花賞", file: "20260119_Memo_Olympian City_全年印花賞.pdf", icon: "📄", expiry: "2026-12-31" },
        { name: "20260120_Memo_Olympian City_2026新春接財神", file: "20260120_Memo_Olympian City_2026新春接財神.pdf", icon: "📄", expiry: "2026-07-01" },
        { name: "20260204_Memo_The Point新地商場x 內地支付寶 2026 消費獎賞活動", file: "20260204_Memo_The Point新地商場x 內地支付寶 2026 消費獎賞活動.pdf", icon: "📄", expiry: "2026-12-31" },
        { name: "20260618_Memo_HKTB_Summer Fun", file: "20260618_Memo_HKTB_Summer Fun.pdf", icon: "📄", expiry: "2026-09-01"},
        { name: "20260610_Memo_東港城_7.1慶回歸激賞", file: "20260610_Memo_東港城_7.1慶回歸激賞.pdf", icon: "📄", expiry: "2026-08-01"},
        { name: "20260527_Memo_奧海城 Goal Together (世界杯)", file: "20260527_Memo_奧海城 Goal Together (世界杯).pdf", icon: "📄", expiry: "2026-10-01"},
        { name: "20260514_Memo_恒基兆業地產成員尊享優惠", file: "20260514_Memo_恒基兆業地產成員尊享優惠.pdf", icon: "📄", expiry: "2026-12-31"},
        { name: "20260514_Memo_恒基兆業地產成員尊享優惠-HLD PMD Staff Card Samples", file: "20260514_Memo_恒基兆業地產成員尊享優惠-HLD PMD Staff Card Samples.pdf", icon: "📄", expiry: "2026-12-31"},
        { name: "20260508_Memo_將軍澳中心電子現金劵", file: "20260508_Memo_將軍澳中心電子現金劵.pdf", icon: "📄"}
      ],

      "銷售與營運部": [],
      "人力資源及行政部": [
        { name: "如何蒞臨Cherry Office", file: "lead the way.mp4", icon: "📹" }
      ],

      "電腦部": [
        { name: "POS操作速查表", file: "POS操作速查表.pdf", icon: "📄" },
        { name: "網頁二維碼", file: "網頁二維碼.gif", icon: "📄" },
        { name: "PE條碼列表", file: "PE條碼列表.pdf", icon: "📄" }
        { name: "Fix PC Error", file: "fix.bat", icon: "📄" }
      ]
    };

    let countdownInterval = null;

    document.getElementById("submitBtn").addEventListener("click", checkPassword);
    document.getElementById("logoutBtn").addEventListener("click", confirmLogout);
    document.getElementById("closeVideoBtn").addEventListener("click", closeVideo);
    document.getElementById("passwordInput").addEventListener("keydown", function(e) {
      if (e.key === "Enter") checkPassword();
    });

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const correctPassword = "23306811";
      document.getElementById("errorMsg").textContent = "";
      if (!input) {
        document.getElementById("errorMsg").textContent = "請輸入密碼。";
        return;
      }
      if (input === correctPassword) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("fileSection").style.display = "block";
        document.getElementById("logoutBtn").style.display = "inline-block";
        renderFiles();
        startLogoutTimer();
      } else {
        document.getElementById("errorMsg").textContent = "密碼錯誤，請再試一次。";
      }
    }

    function renderFiles() {
      const section = document.getElementById("fileSection");
      section.innerHTML = "";

      const table = document.createElement("table");
      table.setAttribute("border", "1");
      table.setAttribute("cellpadding", "8");

      const departments = Object.keys(formCategories);

      // 1. Pre-process and filter valid, sorted announcements for each department
      const processedCategories = {};
      const today = new Date();

      departments.forEach(dept => {
        // Filter out expired items
        const validForms = formCategories[dept].filter(item => {
          if (!item.expiry) return true;
          const expiryDate = new Date(item.expiry + "T23:59:59");
          return expiryDate >= today;
        });

        // Sort items by date prefix in descending order
        processedCategories[dept] = validForms.sort((a, b) => {
          const dateA = parseInt(a.name.split("_")[0], 10) || 0;
          const dateB = parseInt(b.name.split("_")[0], 10) || 0;
          return dateB - dateA;
        });
      });

      // 2. Render Header row
      const headerRow = document.createElement("tr");
      departments.forEach(dept => {
        const th = document.createElement("th");
        th.textContent = dept;
        th.style.backgroundColor =
          dept === "市場部" ? "darkred" :
          dept === "銷售與營運部" ? "darkblue" :
          dept === "人力資源及行政部" ? "darkslategray" :
          dept === "電腦部" ? "darkgreen" : "gray";
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      // 3. Find maximum length based ONLY on active items
      const maxLength = Math.max(...Object.values(processedCategories).map(arr => arr.length));
      const rowsCount = Math.max(1, maxLength); // Minimum 1 row to show empty messages

      // 4. Build compressed table rows
      for (let i = 0; i < rowsCount; i++) {
        const row = document.createElement("tr");
        departments.forEach(dept => {
          const td = document.createElement("td");
          td.setAttribute("style", "text-align:left;");

          const deptForms = processedCategories[dept];

          if (deptForms[i]) {
            const fileUrl = encodeURI(deptForms[i].file);
            const fileName = escapeHtml(deptForms[i].name);
            const isVideo = deptForms[i].file.toLowerCase().endsWith('.mp4');

            // Play .mp4 internally without changing pages, download or target new windows for other assets
            if (isVideo) {
              td.innerHTML = `${deptForms[i].icon} <a href="#" onclick="playVideo('${fileUrl}'); return false;">${fileName}</a>`;
            } else {
              td.innerHTML = `${deptForms[i].icon} <a href="${fileUrl}" download>${fileName}</a>`;
            }
          } else {
            // Only show empty prompt in the very first row if the list is completely blank
            if (i === 0) {
              td.innerHTML = `<em class="no-ann">— 暫無公告 —</em>`;
            } else {
              td.innerHTML = "";
            }
          }
          row.appendChild(td);
        });
        table.appendChild(row);
      }

      // Responsive display wrapper
      const wrapper = document.createElement("div");
      wrapper.className = "table-responsive";
      wrapper.appendChild(table);

      section.appendChild(wrapper);
    }

    // Modal control handlers
    function playVideo(url) {
      const modal = document.getElementById("videoModal");
      const video = document.getElementById("modalVideo");
      
      video.src = url;
      modal.style.display = "flex";
      video.play();

      // Automatically exit and return to board when movie completes playing
      video.onended = function() {
        closeVideo();
      };
    }

    function closeVideo() {
      const modal = document.getElementById("videoModal");
      const video = document.getElementById("modalVideo");
      
      video.pause();
      video.src = ""; // Flush source data stream
      modal.style.display = "none";
    }

    function startLogoutTimer() {
      if (countdownInterval) clearInterval(countdownInterval);
      let remaining = 600; 
      updateCountdown(remaining);
      countdownInterval = setInterval(() => {
        remaining--;
        updateCountdown(remaining);
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          logout(true);
        }
      }, 1000);
    }

    function updateCountdown(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      document.getElementById("sessionMsg").textContent =
        "工作階段剩餘時間: " + minutes + "分 " + (secs < 10 ? "0" : "") + secs + "秒";
    }

    function confirmLogout() {
      if (confirm("確定要登出嗎？")) logout(false);
    }

    function logout(auto = true) {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      closeVideo(); // Reset video player context if open during automatic session timeout
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("fileSection").style.display = "none";
      document.getElementById("passwordInput").value = "";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("sessionMsg").textContent = "";
      document.getElementById("errorMsg").textContent = auto ? "工作階段已到期，請重新登入。" : "";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }
  </script>
</body>
</html>
