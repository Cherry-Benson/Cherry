<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>部門公告 - 僅供內部使用</title>
</head>
<body style="margin:0; height:100vh; display:flex; justify-content:center; align-items:center;">

  <div style="text-align:center;">
    <h1 style="font-size:28px;">部門公告 - 僅供內部使用</h1>

    <!-- 登入區塊 -->
    <div id="loginSection" style="font-size:20px;">
      <h2>請輸入密碼</h2>
      <input type="password" id="passwordInput" placeholder="密碼" aria-label="Password Input" style="font-size:18px;"/>
      <button id="submitBtn" style="font-size:18px;">提交</button>
      <p id="errorMsg" style="color:red;"></p>
    </div>

    <!-- 公告區塊 -->
    <div id="fileSection" style="margin-top:20px; display:none;"></div>

    <!-- 登出按鈕 -->
    <button id="logoutBtn" style="display:none; margin-top:20px; font-size:18px;">手動登出</button>
    <p id="sessionMsg" style="font-size:18px;"></p>
  </div>

  <script>
    const formCategories = {
      "市場部": [
        { name: "20260424_Memo_$50coupon(專門店版本)", file: "20260424_Memo_$50coupon(專門店版本).pdf", icon: "📄" },
		{ name: "20260424_Memo_Cherry x 中原電器", file: "20260424_Memo_Cherry x 中原電器.pdf", icon: "📄" },
		{ name: "20240903_Memo_使用優惠券指引", file: "20240903_Memo_使用優惠券指引.pdf", icon: "📄" },
        { name: "20260402_Memo_HKTB_YRO26-27", file: "20260402_Memo_HKTB_YRO26-27.pdf", icon: "📄" },
        { name: "20241208_Memo_長者卡樂悠卡", file: "20241208_Memo_長者卡樂悠卡.pdf", icon: "📄" },
        { name: "20250616_Memo_$50coupon(新加印版本)", file: "20250616_Memo_$50coupon(新加印版本).pdf", icon: "📄" },
        { name: "20250922_Memo_The Point「會員全年尊尚禮遇」", file: "20250922_Memo_The Point「會員全年尊尚禮遇.pdf", icon: "📄" },
        { name: "20251209_Memo_將中_健康生活賞", file: "20251209_Memo_將中_健康生活賞.pdf", icon: "📄" },
        { name: "20251216_Memo_Olympian City S+ REWARDS_S Coupon", file: "20251216_Memo_Olympian City S+ REWARDS_S Coupon.pdf", icon: "📄" },
        { name: "20251230_Memo_Olympian City_YRO2026", file: "20251230_Memo_Olympian City_YRO2026.pdf", icon: "📄" },
        { name: "20260119_Memo_Olympian City_全年印花賞", file: "20260119_Memo_Olympian City_全年印花賞.pdf", icon: "📄" },
        { name: "20260120_Memo_Olympian City_2026新春接財神", file: "20260120_Memo_Olympian City_2026新春接財神.pdf", icon: "📄" },
        { name: "20260204_Memo_The Point新地商場x 內地支付寶 2026 消費獎賞活動", file: "20260204_Memo_The Point新地商場x 內地支付寶 2026 消費獎賞活動.pdf", icon: "📄" },
        { name: "20260325_Memo_《Mikiki 2026 4月至5月 消費特刊》", file: "20260325_Memo_《Mikiki 2026 4月至5月 消費特刊》.pdf", icon: "📄" },
        { name: "20260424_Memo_ThePoint_母親節", file: "20260424_Memo_ThePoint_母親節.pdf", icon: "📄" }
      ],
      "銷售與營運部": [
        // 已移除 20260327 復活節 補貨通告
      ],
      "電腦部": [
        { name: "POS操作速查表", file: "POS操作速查表.pdf", icon: "📄" },
        { name: "網頁二維碼", file: "網頁二維碼.gif", icon: "📄" }
      ]
    };

    let countdownInterval = null;

    document.getElementById("submitBtn").addEventListener("click", checkPassword);
    document.getElementById("logoutBtn").addEventListener("click", confirmLogout);

    function checkPassword() {
      const input = document.getElementById("passwordInput").value;
      const correctPassword = "23306811";
      if (input === correctPassword) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("fileSection").style.display = "block";
        document.getElementById("logoutBtn").style.display = "inline-block";
        renderFiles();
        startLogoutTimer();
      } else {
        document.getElementById("errorMsg").textContent = "密碼錯誤，請再試一次。";
      }
    }

    function renderFiles() {
      const section = document.getElementById("fileSection");
      section.innerHTML = "";

      const table = document.createElement("table");
      table.setAttribute("border", "1");
      table.setAttribute("cellpadding", "8");
      table.setAttribute("style", "margin:auto; border-collapse:collapse;");

      // Header row with colors + background shading
      const headerRow = document.createElement("tr");
      Object.keys(formCategories).forEach(dept => {
        const th = document.createElement("th");
        th.textContent = dept;
        th.style.padding = "10px";
        th.style.color =
          dept === "市場部" ? "white" :
          dept === "銷售與營運部" ? "white" :
          dept === "電腦部" ? "white" : "black";
        th.style.backgroundColor =
          dept === "市場部" ? "darkred" :
          dept === "銷售與營運部" ? "darkblue" :
          dept === "電腦部" ? "darkgreen" : "gray";
        headerRow.appendChild(th);
      });
      table.appendChild(headerRow);

      // Build rows
      const maxLength = Math.max(...Object.values(formCategories).map(arr => arr.length));
      for (let i = 0; i < maxLength; i++) {
        const row = document.createElement("tr");
        Object.keys(formCategories).forEach(dept => {
          const td = document.createElement("td");
          td.setAttribute("style", "text-align:left;");
          const sortedForms = formCategories[dept].slice().sort((a, b) => {
            const dateA = parseInt(a.name.split("_")[0], 10) || 0;
            const dateB = parseInt(b.name.split("_")[0], 10) || 0;
            return dateB - dateA;
          });
          if (sortedForms[i]) {
            td.innerHTML = `${sortedForms[i].icon} <a href="${sortedForms[i].file}" download>${sortedForms[i].name}</a>`;
          }
          row.appendChild(td);
        });
        table.appendChild(row);
      }

      section.appendChild(table);
    }

    function startLogoutTimer() {
      if (countdownInterval) {
        clearInterval(countdownInterval);
      }
      let remaining = 600; // 600 seconds = 10 minutes
      updateCountdown(remaining);
      countdownInterval = setInterval(() => {
        remaining--;
        updateCountdown(remaining);
        if (remaining <= 0) {
          clearInterval(countdownInterval);
          logout(true);
        }
      }, 1000);
    }

    function updateCountdown(seconds) {
      const minutes = Math.floor(seconds / 60);
      const secs = seconds % 60;
      document.getElementById("sessionMsg").textContent =
        "工作階段剩餘時間: " + minutes + "分 " + (secs < 10 ? "0" : "") + secs + "秒";
    }

    function confirmLogout() {
      const confirmAction = confirm("確定要登出嗎？");
      if (confirmAction) {
        logout(false);
      }
    }

    function logout(auto = true) {
      if (countdownInterval) {
        clearInterval(countdownInterval);
        countdownInterval = null;
      }
      document.getElementById("loginSection").style.display = "block";
      document.getElementById("fileSection").style.display = "none";
      document.getElementById("passwordInput").value = "";
      document.getElementById("logoutBtn").style.display = "none";
      document.getElementById("sessionMsg").textContent = "";
      if (auto) {
        document.getElementById("errorMsg").textContent = "工作階段已到期，請重新登入。";
      } else {
        document.getElementById("errorMsg").textContent = "";
      }
    }
  </script>
</body>
</html
